<div class="container">
  <button (click)="sortProducts()">Сорт</button>
<div class="products-grid">
  @for (product of products; track product.id) {
    @if (currentCategory === 'Все' || product.category === currentCategory) {
      <app-product-card 
        [product]="product" 
        (remove)="removeProduct($event)"> </app-product-card>
    }
  }
</div>
</div>
