<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Event Invite</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #fdf6e3;
            padding: 20px;
        }

        h1 {
            color: #ff4500;
        }

        h2 {
            color: #ff8c00;
        }

        .details {
            background-color: #fff3e0;
            padding: 15px;
            border: 2px solid #ffa500;
            width: 300px;
            margin-bottom: 20px;
        }

        ul {
            margin: 0;
            padding-left: 20px;
        }

        .rsvp-button {
            background-color: #ff4500;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }

        .answ-button:hover {
            background-color: #ff6347;
        }
    </style>
</head>
<body>

    <h1>You're invited!</h1>
    <h2>To my Birthday Bash 🎉</h2>

    <div class="details">
        <p>The details:</p>
        <ul>
            <li>Date: September 29, 2026</li>
            <li>Time: 7:00 PM</li>
            <li>Location: Bowling</li>
            <li>Dress Code: Fun & Casual</li>
        </ul>
    </div>

    <a href="#" class="answ-button">Answer Here</a>

</body>
</html>
